<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GanttShot</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f6fa;--surface:#ffffff;--surface2:#eef0f6;--surface3:#e4e6f0;
    --border:#d0d4e4;--border2:#b8bdd4;
    --accent:#5b6af0;--accent2:#4456e0;--accent-dim:rgba(91,106,240,0.10);
    --text:#1a1d2e;--text2:#5a6080;--text3:#9098b8;
    --green:#1a9e5c;--orange:#c4620a;--red:#c0374a;--purple:#7a5bc4;--cyan:#1a9ea4;--pink:#c0567a;
    --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  #topbar{display:flex;align-items:center;gap:9px;padding:0 14px;height:48px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
  .logo{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--accent2);letter-spacing:-.5px;margin-right:4px;white-space:nowrap;}
  .sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
  .tb-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
  .tb-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
  .tb-btn.primary{background:var(--accent-dim);border-color:var(--accent);color:var(--accent2);}
  .tb-btn.primary:hover{background:rgba(91,106,240,.25);}
  .tb-btn.zactive{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tb-btn svg{width:13px;height:13px;flex-shrink:0;}
  .spacer{flex:1;min-width:6px;}
  #project-title{font-family:var(--mono);font-size:12px;color:var(--text2);white-space:nowrap;}
  #project-title span{color:var(--text);}

  .zoom-group{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0;}
  .zoom-group .tb-btn{border:none;border-radius:0;border-right:1px solid var(--border);}
  .zoom-group .tb-btn:last-child{border-right:none;}

  #filter-bar{display:flex;align-items:center;gap:7px;padding:5px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:35px;flex-wrap:wrap;}
  .flabel{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
  .tag-chip{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;border:1px solid transparent;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .15s;}
  .tag-chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .tag-chip.active{border-color:currentColor;background:rgba(255,255,255,.05);}
  .tag-chip.inactive{opacity:.35;}
  #fchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}

  #main{display:flex;flex:1;overflow:hidden;}
  #sidebar{width:290px;min-width:170px;max-width:480px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
  #sidebar-head{display:flex;align-items:center;padding:0 12px;height:38px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
  #task-list{flex:1;overflow-y:auto;overflow-x:hidden;}
  .task-row{display:flex;align-items:center;height:36px;border-bottom:1px solid var(--border);cursor:default;transition:background .1s;position:relative;}
  .task-row:hover{background:var(--surface2);}
  .task-row.group-row{background:var(--surface2);}
  .task-row.group-row:hover{background:var(--surface3);}
  .task-toggle{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;flex-shrink:0;transition:transform .15s;}
  .task-toggle.open{transform:rotate(90deg);}
  .task-name-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:4px;padding:0 3px;overflow:hidden;}
  .task-name{font-family:var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
  .task-tags{display:flex;gap:2px;flex-shrink:0;}
  .tiny-tag{padding:1px 5px;border-radius:10px;font-size:9px;font-family:var(--mono);}
  .task-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:center;gap:1px;padding-right:6px;opacity:0;transition:opacity .1s;background:linear-gradient(to right,transparent,var(--surface2) 28%);}
  .task-row:hover .task-actions{opacity:1;}
  .task-row.group-row .task-actions{background:linear-gradient(to right,transparent,var(--surface3) 28%);}
  .act-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .1s;}
  .act-btn:hover{background:var(--surface3);color:var(--text);}
  .act-btn svg{width:11px;height:11px;}

  #rh{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;}
  #rh:hover{background:var(--accent);}

  #gantt-wrap{flex:1;overflow:auto;position:relative;}
  #gcw{position:relative;}
  #ghdr{position:sticky;top:0;z-index:10;background:var(--surface2);border-bottom:1px solid var(--border);}
  .grow1{display:flex;height:19px;border-bottom:1px solid var(--border);}
  .grow2{display:flex;height:18px;}
  .gcell{display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;overflow:hidden;}
  .grow1 .gcell:last-child,.grow2 .gcell:last-child{border-right:1px solid var(--border);}
  .gcell.sub{font-size:9px;color:var(--text3);}
  .gcell.td{background:rgba(91,106,240,.18);color:var(--accent2);}
  .gcell.dim{background:rgba(255,255,255,.015);}

  #grows{position:relative;}
  .grow{height:36px;border-bottom:1px solid var(--border);position:relative;}
  .grow.even{background:rgba(0,0,0,.014);}
  .grow.grp{background:var(--surface2);}
  .vl{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;}
  .vl.td{background:var(--accent);opacity:.55;z-index:5;}

  .gbar{position:absolute;height:22px;border-radius:4px;display:flex;align-items:center;cursor:grab;user-select:none;overflow:hidden;z-index:3;transition:filter .1s,box-shadow .1s;}
  .gbar:hover{filter:brightness(1.12);box-shadow:0 2px 14px rgba(0,0,0,.45);}
  .gbar.drag{cursor:grabbing;opacity:.82;z-index:20;}
  .binner{flex:1;padding:0 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-family:var(--sans);font-weight:500;}
  .bprog{position:absolute;left:0;top:0;bottom:0;opacity:.22;border-radius:4px;pointer-events:none;background:rgba(255,255,255,1);}
  .rhl,.rhr{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;z-index:4;}
  .rhl{left:0;}.rhr{right:0;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:22px;min-width:360px;max-width:540px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto;}
  .modal h3{font-family:var(--mono);font-size:14px;color:var(--text);margin-bottom:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .field input[type=color]{padding:3px;height:32px;cursor:pointer;}
  .field input[type=range]{padding:0;height:32px;background:none;border:none;}
  .frow{display:flex;gap:9px;}.frow .field{flex:1;}
  .mactions{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;}
  .btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--surface2);color:var(--text);}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.accent:hover{background:var(--accent2);}
  .btn.danger{border-color:var(--red);color:var(--red);}
  .btn.danger:hover{background:rgba(224,92,106,.15);}

  #tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:26px;}
  .tpill{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:11px;font-family:var(--mono);border:1px solid transparent;}
  .tpill .rm{cursor:pointer;opacity:.5;font-size:13px;line-height:1;margin-left:2px;}
  .tpill .rm:hover{opacity:1;}
  .atrow{display:flex;gap:6px;align-items:center;}
  .atrow input[type=text]{flex:1;padding:6px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
  .atrow input[type=text]:focus{border-color:var(--accent);}
  .atrow input[type=color]{width:36px;padding:3px;height:30px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;}

  #ttag-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;min-height:26px;}
  .ttpill{padding:5px 11px;border-radius:20px;font-size:11px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;transition:all .15s;}
  .icrow{display:flex;gap:6px;align-items:center;padding-top:10px;border-top:1px solid var(--border);}
  .icrow label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;white-space:nowrap;}
  .icrow input[type=text]{flex:1;padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
  .icrow input[type=text]:focus{border-color:var(--accent);}
  .icrow input[type=color]{width:32px;padding:2px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;}

  .fprev{padding:10px;background:var(--surface2);border-radius:var(--radius);text-align:center;margin-top:6px;border:1px solid var(--border);}

  ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--surface);}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--text3);}

  #ctx{position:fixed;z-index:200;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:4px;min-width:155px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;}
  .ci{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .1s;}
  .ci:hover{background:var(--surface3);color:var(--text);}
  .ci.danger:hover{background:rgba(224,92,106,.15);color:var(--red);}
  .ci svg{width:12px;height:12px;flex-shrink:0;}

  #toast{position:fixed;bottom:18px;right:18px;z-index:300;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 14px;font-size:12px;font-family:var(--mono);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
  #toast.show{opacity:1;transform:translateY(0);}
  .hidden{display:none!important;}

  /* ── DRAG REORDER ── */
  .drag-handle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--text3);flex-shrink:0;opacity:0;transition:opacity .1s;}
  .task-row:hover .drag-handle{opacity:1;}
  .drag-handle:active{cursor:grabbing;}
  .drag-handle svg{width:9px;height:9px;}
  .task-row.drop-above{box-shadow:inset 0 2px 0 var(--accent);}
  .task-row.drop-below{box-shadow:inset 0 -2px 0 var(--accent);}
  .task-row.dragging{opacity:.45;background:var(--surface3)!important;}

  /* ── SUBTASKS ── */
  .task-row.subtask-row .task-name{font-size:11.5px;color:var(--text2);}
  .subtask-bar{height:18px!important;top:9px!important;border-radius:3px!important;}

  /* ── DATE COLUMN ── */
  .date-col{width:108px;flex-shrink:0;padding:0 1px 0 6px;font-size:10px;font-family:var(--mono);color:var(--text3);text-align:right;white-space:nowrap;overflow:hidden;transition:width .18s,opacity .18s,padding .18s;}
  .date-col.hide{width:0!important;padding:0!important;opacity:0;pointer-events:none;}
  #sidebar-head .date-col{color:var(--text3);font-size:9px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:flex-end;}
  .date-toggle-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent2);}

  /* ── GROUP NAME EDIT ── */
  .grp-name-inp{background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;outline:none;width:130px;padding:1px 2px;}

  /* ── DEFAULT FONT MODAL ── */
  #mdefaults .fprev{margin-top:8px;}

  #qarow{display:flex;align-items:center;gap:7px;padding:5px 10px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  #qarow input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
  #qarow input:focus{border-color:var(--accent);}

  #expov{position:fixed;inset:0;background:rgba(240,241,248,.82);z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  #expov.show{display:flex;}
  #expov p{font-family:var(--mono);color:var(--text2);font-size:13px;}
  .spin{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  @keyframes cloud-spin{to{transform:rotate(360deg);}}
  #cloud-status{display:none;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;padding:0 2px;white-space:nowrap;flex-shrink:0;}
  #cloud-status svg{flex-shrink:0;}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">◈ GANTTSHOT</div>
  <div class="sep"></div>
  <button class="tb-btn primary" onclick="openAddTask()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>Task
  </button>
  <button class="tb-btn" onclick="openAddGroup()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="12" height="8" rx="1"/></svg>Group
  </button>
  <button class="tb-btn" onclick="openTagManager()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8l5-5h6v6l-5 5z"/><circle cx="10" cy="6" r="1.5" fill="currentColor"/></svg>Tags
  </button>
  <div class="sep"></div>
  <div class="zoom-group">
    <button class="tb-btn" id="zd" onclick="setZoom('day')">Days</button>
    <button class="tb-btn zactive" id="zw" onclick="setZoom('week')">Weeks</button>
    <button class="tb-btn" id="zm" onclick="setZoom('month')">Months</button>
    <button class="tb-btn" id="zq" onclick="setZoom('quarter')">Quarters</button>
  </div>
  <div class="sep"></div>
  <button class="tb-btn" onclick="shiftView(-1)">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,3 5,8 10,13"/></svg>Back
  </button>
  <button class="tb-btn" onclick="gotoToday()">Today</button>
  <button class="tb-btn" onclick="shiftView(1)">Forward
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,3 11,8 6,13"/></svg>
  </button>
  <div class="sep"></div>
  <button class="tb-btn" onclick="exportData()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8m-3-3l3 3 3-3M3 13h10"/></svg>Export
  </button>
  <button class="tb-btn" onclick="importData()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 14V6m-3 3l3-3 3 3M3 3h10"/></svg>Import
  </button>
  <button class="tb-btn" onclick="exportPNG()" title="PNG · chart area only · 3x quality">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M2 11l3-3 2 2 3-4 4 5"/><circle cx="5.5" cy="5.5" r="1" fill="currentColor"/></svg>PNG
  </button>
  <button class="tb-btn" onclick="exportSVG()" title="SVG · chart area only">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="12" height="12" rx="1"/><polyline points="4,11 7,8 9,10 12,6"/></svg>SVG
  </button>
  <button class="tb-btn" onclick="exportXLS()" title="Export to Excel">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="12" height="12" rx="1"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="9" y2="12"/></svg>XLS
  </button>
  <button class="tb-btn" id="dfontBtn" onclick="openDefaults()" title="Default font">
    <svg viewBox="0 0 16 16" fill="currentColor"><text x="1" y="12" font-size="10" font-family="serif">Aa</text></svg>Font
  </button>
  <div class="spacer"></div>
  <div id="cloud-status"></div>
  <div id="project-title">Project: <span id="pname">–</span></div>
</div>

<div id="filter-bar">
  <span class="flabel">Filter:</span>
  <div id="fchips"></div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-head">
      <span style="flex:1">Tasks</span>
      <div class="date-col hide" id="date-col-head" style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);display:flex;align-items:center;justify-content:flex-end;">Dates</div>
      <button class="tb-btn date-toggle-btn" id="dateToggleBtn" onclick="toggleDateCol()" title="Show/hide dates" style="margin-left:6px;padding:3px 7px;font-size:10px;">
        <svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="12" height="11" rx="1"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>
      </button>
    </div>
    <div id="task-list"></div>
    <div id="qarow">
      <input id="qa" placeholder="Quick add task…" onkeydown="quickAdd(event)"/>
      <button class="tb-btn primary" onclick="quickAdd({key:'Enter'})">+</button>
    </div>
  </div>
  <div id="rh"></div>
  <div id="gantt-wrap">
    <div id="gcw">
      <div id="ghdr"></div>
      <div id="grows"></div>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx">
  <div class="ci" onclick="ctxEdit()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2l3 3-9 9H2v-3z"/></svg>Edit</div>
  <div class="ci" onclick="ctxFont()"><svg viewBox="0 0 16 16" fill="currentColor"><text x="1" y="12" font-size="11" font-family="serif">Aa</text></svg>Text style</div>
  <div class="ci" onclick="ctxTag()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8l5-5h6v6l-5 5z"/><circle cx="10" cy="6" r="1" fill="currentColor"/></svg>Tags</div>
  <div class="ci" onclick="ctxSubtask()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,4 4,12 12,12"/><line x1="8" y1="12" x2="8" y2="8"/><line x1="6" y1="8" x2="10" y2="8"/></svg>Add subtask</div>
  <div class="ci danger" onclick="ctxDel()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,4 13,4"/><path d="M6 4V3h4v1M5 4l1 9h4l1-9"/></svg>Delete</div>
</div>

<script>
// ══════════════════════════════
//  STATE
// ══════════════════════════════
const TODAY=(()=>{const d=new Date();d.setHours(0,0,0,0);return d;})();
const ZCFG={
  day:    {colW:28, span:90},
  week:   {colW:80, span:26},
  month:  {colW:90, span:18},
  quarter:{colW:160,span:8},
};
let zoom='week', viewStart=new Date(TODAY);
let ctxId=null, editId=null, ttagId=null, fontId=null, ttagSel=new Set();
let showDates=false;
let S={projectName:'New project',groups:[],tasks:[],globalTags:[],activeTags:[],defaults:{size:13,color:'#1a1d2e',weight:'400'}};

// ── CLOUD SYNC CONFIG ──
const CLOUD_URL='https://gantt-production-3714.up.railway.app';
const CLOUD_KEY=''; // Optional: must match GANTT_SECRET env var on the server
let _cloudSaveTimer=null,_skipCloudSave=false,_seedLoaded=false;

// ══════════════════════════════
//  UTILS
// ══════════════════════════════
const uid=()=>Math.random().toString(36).slice(2,9);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const addMonths=(d,n)=>{const r=new Date(d);r.setMonth(r.getMonth()+n);return r;};
const daysBetween=(a,b)=>Math.round((b-a)/86400000);
const fmtDate=d=>d.toISOString().slice(0,10);
const parseDate=s=>{if(/^\d{2}\.\d{2}\.\d{2}$/.test(s)){const[dd,mm,yy]=s.split('.');const dt=new Date(2000+Number(yy),Number(mm)-1,Number(dd));dt.setHours(0,0,0,0);return dt;}const d=new Date(s);d.setHours(0,0,0,0);return d;};
const h2rgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `${r},${g},${b}`;};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
const cm=id=>document.getElementById(id).classList.add('hidden');
const om=id=>document.getElementById(id).classList.remove('hidden');

// ══════════════════════════════
//  ZOOM & VIEW
// ══════════════════════════════
function setZoom(z){
  zoom=z;
  ['day','week','month','quarter'].forEach(k=>document.getElementById('z'+k[0]).classList.toggle('zactive',k===z));
  normalise(); render();
}
function normalise(){
  if(zoom==='month'){viewStart.setDate(1);}
  else if(zoom==='quarter'){viewStart.setDate(1);viewStart.setMonth(Math.floor(viewStart.getMonth()/3)*3);}
}
function shiftView(dir){
  const s=ZCFG[zoom].span;
  if(zoom==='day')     viewStart=addDays(viewStart,dir*Math.round(s/3));
  else if(zoom==='week')  viewStart=addDays(viewStart,dir*7*Math.round(s/3));
  else if(zoom==='month') viewStart=addMonths(viewStart,dir*Math.round(s/3));
  else                    viewStart=addMonths(viewStart,dir*3*Math.round(s/3));
  normalise(); render();
}
function gotoToday(){viewStart=new Date(TODAY);normalise();render();}

// ══════════════════════════════
//  COLUMN BUILDER
// ══════════════════════════════
function buildCols(){
  const cfg=ZCFG[zoom], cols=[];
  // extend at least to cover the last task's end date
  let maxEnd=addDays(viewStart,cfg.span);
  S.tasks.forEach(t=>{if(t.end){const e=parseDate(t.end);if(e>maxEnd)maxEnd=e;}});
  if(zoom==='day'){
    for(let i=0;addDays(viewStart,i)<maxEnd;i++){const d=addDays(viewStart,i);cols.push({w:cfg.colW,s:d,e:addDays(d,1),sub:d.getDate(),dim:(d.getDay()===0||d.getDay()===6),td:d.getTime()===TODAY.getTime()});}
  } else if(zoom==='week'){
    const ws0=wkStart(viewStart);
    for(let i=0;addDays(ws0,i*7)<maxEnd;i++){const ws=addDays(ws0,i*7),we=addDays(ws,7);cols.push({w:cfg.colW,s:ws,e:we,sub:`${ws.getDate()}.${String(ws.getMonth()+1).padStart(2,'0')}`,dim:false,td:TODAY>=ws&&TODAY<we});}
  } else if(zoom==='month'){
    let d=new Date(viewStart);d.setDate(1);
    while(d<maxEnd){const ms=new Date(d),me=addMonths(ms,1);cols.push({w:cfg.colW,s:ms,e:me,sub:ms.toLocaleString('en',{month:'short'}).toUpperCase(),dim:false,td:TODAY>=ms&&TODAY<me});d=me;}
  } else {
    let d=new Date(viewStart);d.setDate(1);d.setMonth(Math.floor(d.getMonth()/3)*3);
    while(d<maxEnd){const qs=new Date(d),qe=addMonths(qs,3),q=Math.floor(qs.getMonth()/3)+1;cols.push({w:cfg.colW,s:qs,e:qe,sub:`Q${q} ${qs.getFullYear()}`,dim:false,td:TODAY>=qs&&TODAY<qe});d=qe;}
  }
  return cols;
}
function wkStart(d){const r=new Date(d),dy=r.getDay();r.setDate(r.getDate()+(dy===0?-6:1-dy));return r;}
function barGeo(start,end,cols){
  const rS=cols[0].s,rE=cols[cols.length-1].e,tot=daysBetween(rS,rE);
  const totW=cols.reduce((s,c)=>s+c.w,0),ppd=totW/tot;
  const s=parseDate(start),e=addDays(parseDate(end),1);
  return{x:daysBetween(rS,s)*ppd,w:daysBetween(s,e)*ppd};
}

// ══════════════════════════════
//  RENDER
// ══════════════════════════════
function render(){
  document.getElementById('pname').textContent=S.projectName;
  saveState();
  renderFilter(); renderSidebar(); renderGantt();
}

// ── FILTER ──
function renderFilter(){
  if(!S.activeTags)S.activeTags=[];
  const fc=document.getElementById('fchips');fc.innerHTML='';
  fc.appendChild(mkChip('All','var(--text3)',S.activeTags.length===0,()=>{S.activeTags=[];render();}));
  S.globalTags.forEach(t=>{
    const on=S.activeTags.includes(t.id);
    fc.appendChild(mkChip(t.name,t.color,on,()=>{
      S.activeTags=on?S.activeTags.filter(x=>x!==t.id):[...S.activeTags,t.id];
      render();
    }));
  });
}
function mkChip(n,c,active,fn){const d=document.createElement('div');d.className='tag-chip '+(active?'active':'inactive');d.style.color=c;d.innerHTML=`<span class="dot" style="background:${c}"></span>${esc(n)}`;d.onclick=fn;return d;}

// ── SIDEBAR ──
function renderSidebar(){
  const el=document.getElementById('task-list');el.innerHTML='';
  getVT().forEach(({task,isG})=>{
    const row=document.createElement('div');
    row.className='task-row'+(isG?' group-row':'')+(task.parentId?' subtask-row':'');
    row.dataset.id=task.id;row.dataset.isg=isG?'1':'';
    row.oncontextmenu=e=>{if(!isG){e.preventDefault();showCtx(e,task.id);}};

    // DRAG HANDLE
    const dh=document.createElement('div');dh.className='drag-handle';
    dh.innerHTML=`<svg viewBox="0 0 9 14" fill="currentColor"><circle cx="2.5" cy="2" r="1.2"/><circle cx="6.5" cy="2" r="1.2"/><circle cx="2.5" cy="7" r="1.2"/><circle cx="6.5" cy="7" r="1.2"/><circle cx="2.5" cy="12" r="1.2"/><circle cx="6.5" cy="12" r="1.2"/></svg>`;
    dh.addEventListener('mousedown',e=>startRowDrag(e,task.id,isG));
    row.appendChild(dh);

    const ind=document.createElement('div');ind.style.width=(isG?0:(task.parentId?14:12))+'px';ind.style.flexShrink='0';row.appendChild(ind);

    if(isG){
      const tog=document.createElement('div');tog.className='task-toggle'+(task.collapsed?'':' open');
      tog.innerHTML=`<svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="5,4 10,8 5,12"/></svg>`;
      tog.onclick=e=>{e.stopPropagation();task.collapsed=!task.collapsed;render();};row.appendChild(tog);
    } else if(S.tasks.some(st=>st.parentId===task.id)){
      const tog=document.createElement('div');tog.className='task-toggle'+(task.collapsed?'':' open');
      tog.innerHTML=`<svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="5,4 10,8 5,12"/></svg>`;
      tog.onclick=e=>{e.stopPropagation();task.collapsed=!task.collapsed;render();};row.appendChild(tog);
    } else {const sp=document.createElement('div');sp.style.width='18px';sp.style.flexShrink='0';row.appendChild(sp);}

    const nw=document.createElement('div');nw.className='task-name-wrap';
    if(isG){
      const nm=document.createElement('div');nm.className='task-name';nm.textContent=task.name;nm.style.fontWeight='500';
      nm.ondblclick=e=>{e.stopPropagation();startGrpEdit(nm,task);};
      nw.appendChild(nm);
    } else {
      const nm=document.createElement('div');nm.className='task-name';nm.textContent=task.name;
      const def=S.defaults||{};
      const fs=task.fontStyle;
      if(fs){if(fs.size)nm.style.fontSize=fs.size+'px';if(fs.color)nm.style.color=fs.color;if(fs.weight)nm.style.fontWeight=fs.weight;}
      else{if(def.size)nm.style.fontSize=def.size+'px';if(def.color)nm.style.color=def.color;if(def.weight)nm.style.fontWeight=def.weight;}
      nw.appendChild(nm);
      if(task.tags&&task.tags.length){
        const tw=document.createElement('div');tw.className='task-tags';
        task.tags.forEach(tid=>{const g=S.globalTags.find(x=>x.id===tid);if(!g)return;const p=document.createElement('div');p.className='tiny-tag';p.style.cssText=`background:rgba(${h2rgb(g.color)},.15);color:${g.color};border:1px solid rgba(${h2rgb(g.color)},.3)`;p.textContent=g.name;tw.appendChild(p);});
        nw.appendChild(tw);
      }
    }
    row.appendChild(nw);

    // DATE COLUMN
    const dc=document.createElement('div');dc.className='date-col'+(showDates?'':' hide');
    if(!isG){const _mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const fmt=d=>{const dt=parseDate(d);return `${dt.getDate()} ${_mn[dt.getMonth()]}`;};dc.textContent=fmt(task.start)+' – '+fmt(task.end);}
    row.appendChild(dc);

    const ac=document.createElement('div');ac.className='task-actions';
    if(!isG){
      ac.innerHTML=`<button class="act-btn" title="Subtask" onclick="event.stopPropagation();addSubtask('${task.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg></button>
      <button class="act-btn" title="Tags" onclick="event.stopPropagation();openTT('${task.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8l5-5h6v6l-5 5z"/><circle cx="10.5" cy="5.5" r="1" fill="currentColor"/></svg></button>
      <button class="act-btn" title="Style" onclick="event.stopPropagation();openFont('${task.id}')"><svg viewBox="0 0 16 16" fill="currentColor"><text x="1" y="12" font-size="10" font-family="serif">Aa</text></svg></button>
      <button class="act-btn" title="Edit" onclick="event.stopPropagation();openEdit('${task.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2l3 3-9 9H2v-3z"/></svg></button>`;
    } else {
      ac.innerHTML=`<button class="act-btn" title="Add task" onclick="event.stopPropagation();addTaskToGroup('${task.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg></button>
      <button class="act-btn" title="Delete" onclick="event.stopPropagation();delGroup('${task.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,4 13,4"/><path d="M6 4V3h4v1M5 4l1 9h4l1-9"/></svg></button>`;
    }
    row.appendChild(ac);el.appendChild(row);
  });
}

function getVT(){
  const res=[],grpd={};
  S.tasks.filter(t=>t.groupId&&!t.parentId).forEach(t=>{if(!grpd[t.groupId])grpd[t.groupId]=[];grpd[t.groupId].push(t);});
  S.groups.forEach(g=>{
    const gt=grpd[g.id]||[];
    if(S.activeTag!==null&&!gt.some(t=>vis(t))) return;
    res.push({task:g,isG:true});
    if(!g.collapsed)gt.forEach(t=>{
      if(vis(t)){
        res.push({task:t,isG:false});
        // subtasks follow parent (only shown when parent is visible and group not collapsed)
        if(!t.collapsed)S.tasks.filter(st=>st.parentId===t.id).forEach(st=>{if(vis(st))res.push({task:st,isG:false});});
      }
    });
  });
  S.tasks.filter(t=>!t.groupId&&!t.parentId).forEach(t=>{
    if(vis(t)){
      res.push({task:t,isG:false});
      if(!t.collapsed)S.tasks.filter(st=>st.parentId===t.id).forEach(st=>{if(vis(st))res.push({task:st,isG:false});});
    }
  });
  return res;
}
function vis(t){return !S.activeTags||S.activeTags.length===0||(t.tags&&S.activeTags.some(id=>t.tags.includes(id)));}


// ── GANTT ──
function renderGantt(){
  const cols=buildCols(),totW=cols.reduce((s,c)=>s+c.w,0);
  const ghdr=document.getElementById('ghdr'),grows=document.getElementById('grows'),gcw=document.getElementById('gcw');
  ghdr.innerHTML='';grows.innerHTML='';
  ghdr.style.width=grows.style.width=gcw.style.width=totW+'px';

  // ROW 1: period grouping
  const r1=document.createElement('div');r1.className='grow1';
  let gk=null,gw=0,gl='';
  cols.forEach(c=>{
    let k,l;
    if(zoom==='day'){k=c.s.getFullYear()+'-'+c.s.getMonth();l=c.s.toLocaleString('en',{month:'long',year:'numeric'});}
    else if(zoom==='week'){k=c.s.getFullYear()+'-'+c.s.getMonth();l=c.s.toLocaleString('en',{month:'short',year:'numeric'}).toUpperCase();}
    else{k=c.s.getFullYear()+'';l=k;}
    if(k!==gk){if(gk!==null)r1.appendChild(mkHC(gw,gl,false));gk=k;gw=c.w;gl=l;}else gw+=c.w;
  });
  if(gk!==null)r1.appendChild(mkHC(gw,gl,false));
  ghdr.appendChild(r1);

  // ROW 2: sub labels
  const r2=document.createElement('div');r2.className='grow2';
  cols.forEach(c=>{const d=document.createElement('div');d.className='gcell sub'+(c.td?' td':'')+(c.dim?' dim':'');d.style.width=c.w+'px';d.textContent=c.sub;r2.appendChild(d);});
  ghdr.appendChild(r2);

  // GANTT ROWS
  getVT().forEach(({task,isG},ri)=>{
    const bg=document.createElement('div');
    bg.className='grow'+(isG?' grp':(ri%2===0?'':' even'));
    bg.style.width=totW+'px';

    let x=0;
    cols.forEach(c=>{
      if(c.dim){const wb=document.createElement('div');wb.style.cssText=`position:absolute;top:0;bottom:0;left:${x}px;width:${c.w}px;background:rgba(0,0,0,.03);pointer-events:none;`;bg.appendChild(wb);}
      const vl=document.createElement('div');vl.className='vl'+(c.td?' td':'');
      vl.style.left=x+'px';
      bg.appendChild(vl);x+=c.w;
    });
    const vlEnd=document.createElement('div');vlEnd.className='vl';vlEnd.style.left=x+'px';bg.appendChild(vlEnd);

    if(!isG){
      const{x:bx,w:bw}=barGeo(task.start,task.end,cols);
      if(bw>0){
        const isSub=!!task.parentId;
        const barH=isSub?18:22;
        const barTop=(36-barH)/2;
        const bar=document.createElement('div');
        bar.className='gbar'+(isSub?' subtask-bar':'');
        bar.style.cssText=`left:${Math.round(bx)}px;width:${Math.max(4,Math.round(bw))}px;background:rgba(${h2rgb(task.color||'#5b6af0')},.82);top:${barTop}px;height:${barH}px;`;
        const p=document.createElement('div');p.className='bprog';p.style.width=(task.progress||0)+'%';bar.appendChild(p);
        const lbl=document.createElement('div');lbl.className='binner';lbl.textContent=task.name;
        const fs=task.fontStyle;const def=S.defaults||{};
        const rawSize=fs&&fs.size?fs.size:(def.size||11);
        const fitSz=Math.min(rawSize,barH-4);
        lbl.style.cssText=`line-height:${barH}px;font-size:${fitSz}px;color:#fff;text-shadow:-1px -1px 0 rgba(0,0,0,.55),1px -1px 0 rgba(0,0,0,.55),-1px 1px 0 rgba(0,0,0,.55),1px 1px 0 rgba(0,0,0,.55);font-weight:${fs&&fs.weight?fs.weight:(def.weight||'500')};`;
        bar.appendChild(lbl);
        const rL=document.createElement('div');rL.className='rhl';
        const rR=document.createElement('div');rR.className='rhr';
        bar.appendChild(rL);bar.appendChild(rR);
        mkBarDrag(bar,task,rL,rR,cols);bg.appendChild(bar);
      }
    }
    grows.appendChild(bg);
  });
}

//  BAR DRAG
// ══════════════════════════════
function mkBarDrag(bar,task,rL,rR,cols){
  let mode=null,sx=0,oS=null,oE=null,oSubs=[];
  const ppd=cols.reduce((s,c)=>s+c.w,0)/daysBetween(cols[0].s,cols[cols.length-1].e);
  bar.addEventListener('mousedown',e=>{if(e.target===rL||e.target===rR)return;e.preventDefault();mode='d';go(e);});
  rL.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();mode='l';go(e);});
  rR.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();mode='r';go(e);});
  function go(e){saveUndo();sx=e.clientX;oS=new Date(parseDate(task.start));oE=new Date(parseDate(task.end));oSubs=S.tasks.filter(t=>t.parentId===task.id).map(t=>({t,s:new Date(parseDate(t.start)),e:new Date(parseDate(t.end))}));bar.classList.add('drag');document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);}
  function mv(e){const dx=Math.round((e.clientX-sx)/ppd);if(mode==='d'){task.start=fmtDate(addDays(oS,dx));task.end=fmtDate(addDays(oE,dx));oSubs.forEach(({t,s,e})=>{t.start=fmtDate(addDays(s,dx));t.end=fmtDate(addDays(e,dx));});}else if(mode==='l'){const ns=addDays(oS,dx);if(ns<parseDate(task.end))task.start=fmtDate(ns);}else{const ne=addDays(oE,dx);if(ne>parseDate(task.start))task.end=fmtDate(ne);}renderGantt();renderSidebar();}
  function up(){mode=null;bar.classList.remove('drag');document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
}

// ══════════════════════════════
//  ROW DRAG (reorder)
// ══════════════════════════════
let _dragId=null,_dragIsG=false,_dragOver=null,_dragPos='below';
function startRowDrag(e,id,isG){
  e.preventDefault();e.stopPropagation();
  _dragId=id;_dragIsG=isG;
  document.addEventListener('mousemove',onRowDragMove);
  document.addEventListener('mouseup',onRowDragUp);
  const el=document.querySelector(`.task-row[data-id="${id}"]`);
  if(el)el.classList.add('dragging');
}
function onRowDragMove(e){
  clearDropIndicators();
  const rows=[...document.querySelectorAll('.task-row:not(.dragging)')];
  let best=null,bpos='below',bd=Infinity;
  rows.forEach(row=>{
    const r=row.getBoundingClientRect();
    const mid=r.top+r.height/2;
    const d=Math.abs(e.clientY-mid);
    if(d<bd){bd=d;best=row;bpos=e.clientY<mid?'above':'below';}
  });
  if(best){best.classList.add('drop-'+bpos);_dragOver=best.dataset.id;_dragPos=bpos;_dragIsGTarget=best.dataset.isg==='1';}
}
function clearDropIndicators(){document.querySelectorAll('.drop-above,.drop-below').forEach(r=>{r.classList.remove('drop-above','drop-below');});}
function onRowDragUp(){
  document.removeEventListener('mousemove',onRowDragMove);
  document.removeEventListener('mouseup',onRowDragUp);
  const dragged=document.querySelector(`.task-row[data-id="${_dragId}"]`);
  if(dragged)dragged.classList.remove('dragging');
  clearDropIndicators();
  if(_dragOver&&_dragOver!==_dragId)reorder(_dragId,_dragIsG,_dragOver,_dragPos);
  _dragId=null;_dragOver=null;
}
function reorder(dragId,dragIsG,targetId,pos){
  saveUndo();const vt=getVT();
  if(dragIsG){
    // reorder groups
    const fi=S.groups.findIndex(g=>g.id===dragId);
    const ti=S.groups.findIndex(g=>g.id===targetId);
    if(fi<0)return;
    const [grp]=S.groups.splice(fi,1);
    const ni=S.groups.findIndex(g=>g.id===targetId);
    S.groups.splice(pos==='above'?ni:ni+1,0,grp);
  } else {
    // reorder tasks
    const fi=S.tasks.findIndex(t=>t.id===dragId);
    const [task]=S.tasks.splice(fi,1);
    // find target in tasks array
    const ti=S.tasks.findIndex(t=>t.id===targetId);
    if(ti<0){S.tasks.push(task);} else {
      S.tasks.splice(pos==='above'?ti:ti+1,0,task);
    }
    // check if dropped on a group row → assign to that group
    const targetGrp=S.groups.find(g=>g.id===targetId);
    if(targetGrp){task.groupId=targetId;task.parentId=null;}
    else{
      // find group of neighbour
      const neighbour=S.tasks.find(t=>t.id===targetId);
      if(neighbour)task.groupId=neighbour.groupId||null;
    }
  }
  render();
}

// ══════════════════════════════
//  PNG EXPORT (chart only, 3x quality)
// ══════════════════════════════
async function exportPNG(){
  const ov=document.getElementById('expov'),msg=document.getElementById('expmsg');
  ov.classList.add('show');msg.textContent='Preparing data…';await sleep(40);
  try{
    await document.fonts.ready;
    const SCALE=3,MG=16,NW=255,DCW=showDates?88:0,SW=NW+DCW,ROW_H=28,HDR_H=56;
    const BG='#f5f6fa',SRF2='#eef0f6',BRD='#d0d4e4',BRDA='#b8bdd4',TEXT='#1a1d2e',TEXT3='#9098b8',ACC='#5b6af0';
    const _mnExp=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const fmtExp=s=>{const dt=parseDate(s);return `${dt.getDate()} ${_mnExp[dt.getMonth()]}`;};
    const fmtExpRange=t=>fmtExp(t.start)+' – '+fmtExp(t.end);
    const cols=buildCols(),totColW=cols.reduce((s,c)=>s+c.w,0),vt=getVT(),rowCount=vt.length;
    let maxBarRight=0;
    vt.forEach(({task,isG})=>{if(isG)return;const{x:bx,w:bw}=barGeo(task.start,task.end,cols);maxBarRight=Math.max(maxBarRight,bx+bw);});
    const usedColW=Math.min(maxBarRight+80,totColW);
    const colScale=Math.min(usedColW/totColW,1);
    const GW=Math.round(usedColW*colScale),GX=MG+SW+8;
    const PW=GX+GW+MG,PH=MG+HDR_H+rowCount*ROW_H+MG;
    const ppd=GW/daysBetween(cols[0].s,cols[cols.length-1].e);
    const cv=document.createElement('canvas');cv.width=PW*SCALE;cv.height=PH*SCALE;
    const ctx=cv.getContext('2d');ctx.scale(SCALE,SCALE);

    // ── BACKGROUND ──
    ctx.fillStyle=BG;ctx.fillRect(0,0,PW,PH);

    // ── SIDEBAR HEADER BG ──
    ctx.fillStyle=SRF2;rr(ctx,MG,MG,SW,HDR_H,4);ctx.fill();
    ctx.fillStyle=TEXT3;ctx.font='9px "IBM Plex Mono",monospace';ctx.fillText('TASKS',MG+10,MG+14);
    if(showDates){ctx.textAlign='right';ctx.fillText('DATES',MG+SW-8,MG+14);ctx.textAlign='left';}

    msg.textContent='Drawing header…';await sleep(10);

    // ── GANTT ZONE (всё ганtt содержимое строго обрезано по GW) ──
    ctx.save();ctx.beginPath();ctx.rect(GX,MG,GW,HDR_H+rowCount*ROW_H);ctx.clip();

    // Gantt header BG
    ctx.fillStyle=SRF2;ctx.fillRect(GX,MG,GW,HDR_H);

    // Row backgrounds in gantt zone
    vt.forEach(({task,isG},ri)=>{
      const ry=MG+HDR_H+ri*ROW_H;
      ctx.fillStyle=isG?SRF2:(ri%2===0?BG:'rgba(0,0,0,.014)');ctx.fillRect(GX,ry,GW,ROW_H);
    });

    // ROW1 – period grouping
    let gk=null,gw=0,gl='',gx2=GX;
    const flushG=()=>{if(gk===null||gw<=0)return;ctx.strokeStyle=BRD;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(gx2+gw,MG);ctx.lineTo(gx2+gw,MG+24);ctx.stroke();ctx.fillStyle='#5a6080';ctx.font='10px "IBM Plex Mono",monospace';ctx.textAlign='center';ctx.fillText(String(gl).slice(0,18),gx2+gw/2,MG+14);ctx.textAlign='left';gx2+=gw;gw=0;};
    cols.forEach(c=>{const cw=c.w*colScale;let k,l;if(zoom==='day'){k=c.s.getFullYear()+'-'+c.s.getMonth();l=String(c.s.getMonth()+1).padStart(2,'0')+'.'+String(c.s.getFullYear()).slice(2);}else if(zoom==='week'){k=c.s.getFullYear()+'-'+c.s.getMonth();l=String(c.s.getMonth()+1).padStart(2,'0')+'.'+String(c.s.getFullYear()).slice(2);}else{k=c.s.getFullYear()+'';l=k;}if(k!==gk){flushG();gk=k;gl=l;gw=cw;}else gw+=cw;});
    flushG();

    // ROW2 – sub labels
    let sx=GX;
    cols.forEach(c=>{const cw=c.w*colScale;if(c.td){ctx.fillStyle='rgba(91,106,240,.10)';ctx.fillRect(sx,MG+24,cw,HDR_H-24);}if(c.dim){ctx.fillStyle='rgba(0,0,0,.03)';ctx.fillRect(sx,MG+24,cw,HDR_H-24);}ctx.strokeStyle=BRD;ctx.lineWidth=.4;ctx.beginPath();ctx.moveTo(sx,MG+24);ctx.lineTo(sx,MG+HDR_H);ctx.stroke();ctx.fillStyle=c.td?ACC:TEXT3;ctx.font='5px "IBM Plex Mono",monospace';ctx.textAlign='center';ctx.fillText(String(c.sub).slice(0,9),sx+cw/2,MG+38);ctx.textAlign='left';sx+=cw;});
    ctx.strokeStyle=BRD;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(GX,MG+HDR_H);ctx.lineTo(GX+GW,MG+HDR_H);ctx.stroke();

    // Gantt rows: vlines + bars (без текста на барах)
    vt.forEach(({task,isG},ri)=>{
      const ry=MG+HDR_H+ri*ROW_H;
      let vx=GX;cols.forEach(c=>{const cw2=c.w*colScale;ctx.strokeStyle=BRD;ctx.lineWidth=.35;ctx.beginPath();ctx.moveTo(vx,ry);ctx.lineTo(vx,ry+ROW_H);ctx.stroke();if(c.dim){ctx.fillStyle='rgba(0,0,0,.02)';ctx.fillRect(vx,ry,cw2,ROW_H);}if(c.td){ctx.fillStyle='rgba(91,106,240,.05)';ctx.fillRect(vx,ry,cw2,ROW_H);}vx+=cw2;});
      if(!isG){
        const{x:bx,w:bw}=barGeo(task.start,task.end,cols);
        const isSub=!!task.parentId,barH=isSub?18:ROW_H-6;
        const bsx=GX+bx*colScale,bsw=Math.max(4,bw*colScale);
        const clx=Math.max(bsx,GX),clw=Math.min(bsx+bsw,GX+GW)-clx;
        if(clw>0){ctx.fillStyle=`rgba(${h2rgb(task.color||ACC)},.83)`;rr(ctx,clx,ry+(ROW_H-barH)/2,clw,barH,3);ctx.fill();if(task.progress>0){ctx.fillStyle='rgba(255,255,255,.16)';rr(ctx,clx,ry+(ROW_H-barH)/2,clw*task.progress/100,barH,3);ctx.fill();}}
      }
    });

    // TODAY line
    const tdOffset=daysBetween(cols[0].s,TODAY),tdx=GX+tdOffset*ppd;
    if(tdx>=GX&&tdx<=GX+GW){ctx.strokeStyle='rgba(91,106,240,.65)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(tdx,MG+HDR_H);ctx.lineTo(tdx,MG+HDR_H+rowCount*ROW_H);ctx.stroke();ctx.setLineDash([]);}

    ctx.restore(); // конец gantt clip

    msg.textContent='Drawing tasks…';await sleep(10);

    // ── SIDEBAR ROWS (задачи) ──
    vt.forEach(({task,isG},ri)=>{
      const ry=MG+HDR_H+ri*ROW_H;
      ctx.fillStyle=isG?SRF2:(ri%2===0?BG:'rgba(0,0,0,.014)');ctx.fillRect(MG,ry,SW,ROW_H);
      const def=S.defaults||{},fs=task.fontStyle;
      ctx.fillStyle=isG?TEXT:(fs&&fs.color?fs.color:(def.color||TEXT));
      const fw=isG?'600':(fs&&fs.weight?fs.weight:(def.weight||'400'));
      const fz=isG?12:(fs&&fs.size?fs.size:(def.size||12));
      ctx.font=`${fw} ${fz}px "IBM Plex Sans",sans-serif`;
      const ix=MG+(isG?8:(task.parentId?24:18));
      ctx.save();ctx.beginPath();ctx.rect(MG,ry,NW,ROW_H);ctx.clip();
      ctx.fillText(task.name,ix,ry+ROW_H/2+fz*0.36);
      ctx.restore();
      if(showDates&&!isG){ctx.fillStyle=TEXT3;ctx.font='9px "IBM Plex Mono",monospace';ctx.textAlign='right';ctx.fillText(fmtExpRange(task),MG+SW-6,ry+ROW_H/2+3.5);ctx.textAlign='left';}
      ctx.strokeStyle=BRD;ctx.lineWidth=.4;ctx.beginPath();ctx.moveTo(MG,ry+ROW_H);ctx.lineTo(MG+SW,ry+ROW_H);ctx.stroke();
    });

    // ── РАЗДЕЛИТЕЛЬ задачи | диаграмма ──
    ctx.strokeStyle=BRDA;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(MG+SW,MG);ctx.lineTo(MG+SW,MG+HDR_H+rowCount*ROW_H);ctx.stroke();

    // ── ВНЕШНЯЯ РАМКА ──
    ctx.strokeStyle=BRDA;ctx.lineWidth=1;rr(ctx,MG,MG,PW-MG*2,HDR_H+rowCount*ROW_H,5);ctx.stroke();

    msg.textContent='Saving…';await sleep(10);
    cv.toBlob(blob=>{const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=(S.projectName||'gantt')+'.png';a.click();URL.revokeObjectURL(u);ov.classList.remove('show');toast('PNG saved (3x)');} ,'image/png');
  }catch(err){document.getElementById('expov').classList.remove('show');toast('Error: '+err.message);console.error(err);}
}

// ══════════════════════════════
//  SVG EXPORT (chart only)
// ══════════════════════════════
async function exportSVG(){
  const ov=document.getElementById('expov'),msg=document.getElementById('expmsg');
  ov.classList.add('show');msg.textContent='Generating SVG…';await sleep(30);
  try{
    const MG=16,NW=255,DCW=showDates?88:0,SW=NW+DCW,ROW_H=28,HDR_H=56;
    const BG='#f5f6fa',SRF2='#eef0f6',BRD='#d0d4e4',BRDA='#b8bdd4',TEXT='#1a1d2e',TEXT2='#5a6080',TEXT3='#9098b8',ACC='#5b6af0';
    const _mnSvg=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const fmtSvg=s=>{const dt=parseDate(s);return `${dt.getDate()} ${_mnSvg[dt.getMonth()]}`;};
    const fmtSvgRange=t=>fmtSvg(t.start)+' – '+fmtSvg(t.end);
    const cols=buildCols(),totColW=cols.reduce((s,c)=>s+c.w,0),vt=getVT();
    let maxBarRight=0;
    vt.forEach(({task,isG})=>{if(isG)return;const{x:bx,w:bw}=barGeo(task.start,task.end,cols);maxBarRight=Math.max(maxBarRight,bx+bw);});
    const usedColW=Math.min(maxBarRight+80,totColW);
    const colScale=Math.min(usedColW/totColW,1);
    const GX=MG+SW+8,GW=Math.round(usedColW*colScale);
    const PW=GX+GW+MG,PH=MG+HDR_H+vt.length*ROW_H+MG;
    const ppd=GW/daysBetween(cols[0].s,cols[cols.length-1].e);
    let parts=[`<svg xmlns="http://www.w3.org/2000/svg" width="${PW}" height="${PH}" font-family="'IBM Plex Sans',sans-serif" font-size="12">`];
    // defs: fonts + clip paths
    parts.push(`<defs><style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap');</style><clipPath id="cp-sb"><rect x="${MG}" y="${MG}" width="${NW}" height="${HDR_H+vt.length*ROW_H}"/></clipPath><clipPath id="cp-gt"><rect x="${GX}" y="${MG}" width="${GW}" height="${HDR_H+vt.length*ROW_H}"/></clipPath></defs>`);
    parts.push(`<rect width="${PW}" height="${PH}" fill="${BG}"/>`);

    // ── SIDEBAR HEADER ──
    parts.push(`<rect x="${MG}" y="${MG}" width="${SW}" height="${HDR_H}" rx="3" fill="${SRF2}"/>`);
    parts.push(`<text x="${MG+8}" y="${MG+13}" font-family="'IBM Plex Mono',monospace" font-size="8" fill="${TEXT3}" letter-spacing="0.5">TASKS</text>`);
    if(showDates)parts.push(`<text x="${MG+SW-8}" y="${MG+13}" font-family="'IBM Plex Mono',monospace" font-size="8" fill="${TEXT3}" text-anchor="end" letter-spacing="0.5">DATES</text>`);

    // ── GANTT ZONE (всё содержимое ганта внутри cp-gt) ──
    parts.push(`<g clip-path="url(#cp-gt)">`);

    // Gantt header BG
    parts.push(`<rect x="${GX}" y="${MG}" width="${GW}" height="${HDR_H}" rx="3" fill="${SRF2}"/>`);

    // Row backgrounds in gantt zone
    vt.forEach(({task,isG},ri)=>{
      const ry=MG+HDR_H+ri*ROW_H;
      parts.push(`<rect x="${GX}" y="${ry}" width="${GW}" height="${ROW_H}" fill="${isG?SRF2:(ri%2===0?BG:'rgba(0,0,0,0.014)')}"/>`);
    });

    // Header row1
    let gk=null,gw=0,gl='',gx=GX;
    const flushG=()=>{if(!gk||!gw)return;parts.push(`<line x1="${gx+gw}" y1="${MG}" x2="${gx+gw}" y2="${MG+22}" stroke="${BRD}" stroke-width="0.5"/>`);parts.push(`<text x="${gx+gw/2}" y="${MG+13}" font-family="'IBM Plex Mono',monospace" font-size="9" fill="${TEXT2}" text-anchor="middle">${esc(String(gl).slice(0,18))}</text>`);gx+=gw;gw=0;};
    cols.forEach(c=>{const cw=c.w*colScale;let k,l;if(zoom==='day'){k=c.s.getFullYear()+'-'+c.s.getMonth();l=String(c.s.getMonth()+1).padStart(2,'0')+'.'+String(c.s.getFullYear()).slice(2);}else if(zoom==='week'){k=c.s.getFullYear()+'-'+c.s.getMonth();l=String(c.s.getMonth()+1).padStart(2,'0')+'.'+String(c.s.getFullYear()).slice(2);}else{k=c.s.getFullYear()+'';l=k;}if(k!==gk){flushG();gk=k;gl=l;gw=cw;}else gw+=cw;});
    flushG();

    // Header row2
    let hx=GX;
    cols.forEach(c=>{const cw=c.w*colScale;if(c.td)parts.push(`<rect x="${hx}" y="${MG+22}" width="${cw}" height="${HDR_H-22}" fill="rgba(91,106,240,0.10)"/>`);parts.push(`<line x1="${hx}" y1="${MG+22}" x2="${hx}" y2="${MG+HDR_H}" stroke="${BRD}" stroke-width="0.4"/>`);parts.push(`<text x="${hx+cw/2}" y="${MG+38}" font-family="'IBM Plex Mono',monospace" font-size="4" fill="${c.td?ACC:TEXT3}" text-anchor="middle">${esc(String(c.sub).slice(0,9))}</text>`);hx+=cw;});
    parts.push(`<line x1="${GX}" y1="${MG+HDR_H}" x2="${GX+GW}" y2="${MG+HDR_H}" stroke="${BRD}" stroke-width="1"/>`);

    // Gantt rows: vlines + bars (без текста на барах)
    vt.forEach(({task,isG},ri)=>{
      const ry=MG+HDR_H+ri*ROW_H;
      let vx2=GX;cols.forEach(c=>{const cw=c.w*colScale;parts.push(`<line x1="${vx2}" y1="${ry}" x2="${vx2}" y2="${ry+ROW_H}" stroke="${BRD}" stroke-width="0.3"/>`);vx2+=cw;});
      if(!isG){
        const{x:bx,w:bw}=barGeo(task.start,task.end,cols);
        const isSub=!!task.parentId,barH=isSub?18:ROW_H-6;
        const bsx=GX+bx*colScale,bsw=Math.max(3,bw*colScale);
        const clx=Math.max(bsx,GX),clw=Math.min(bsx+bsw,GX+GW)-clx;
        if(clw>0){
          const bar_y=ry+(ROW_H-barH)/2;
          parts.push(`<rect x="${clx}" y="${bar_y}" width="${clw}" height="${barH}" rx="3" fill="rgba(${h2rgb(task.color||ACC)},0.83)"/>`);
          if(task.progress>0)parts.push(`<rect x="${clx}" y="${bar_y}" width="${clw*task.progress/100}" height="${barH}" rx="3" fill="rgba(255,255,255,0.16)"/>`);
        }
      }
    });

    // Today line
    const tdx=GX+daysBetween(cols[0].s,TODAY)*ppd;
    if(tdx>=GX&&tdx<=GX+GW)parts.push(`<line x1="${tdx}" y1="${MG+HDR_H}" x2="${tdx}" y2="${MG+HDR_H+vt.length*ROW_H}" stroke="${ACC}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.65"/>`);

    parts.push(`</g>`); // конец gantt clip

    // ── SIDEBAR ROWS (задачи, обрезано по cp-sb) ──
    vt.forEach(({task,isG},ri)=>{
      const ry=MG+HDR_H+ri*ROW_H;
      parts.push(`<rect x="${MG}" y="${ry}" width="${SW}" height="${ROW_H}" fill="${isG?SRF2:(ri%2===0?BG:'rgba(0,0,0,0.014)')}"/>`);
      const def=S.defaults||{},fs=task.fontStyle;
      const fclr=isG?TEXT:(fs&&fs.color?fs.color:(def.color||TEXT));
      const fw2=isG?'600':(fs&&fs.weight?fs.weight:(def.weight||'400'));
      const fz2=isG?12:(fs&&fs.size?fs.size:(def.size||12));
      const ix=MG+(isG?8:(task.parentId?22:16));
      parts.push(`<text x="${ix}" y="${ry+ROW_H/2+fz2*0.36}" font-size="${fz2}" font-weight="${fw2}" fill="${fclr}" clip-path="url(#cp-sb)">${esc(task.name)}</text>`);
      if(showDates&&!isG)parts.push(`<text x="${MG+SW-6}" y="${ry+ROW_H/2+3.5}" font-family="'IBM Plex Mono',monospace" font-size="9" fill="${TEXT3}" text-anchor="end">${esc(fmtSvgRange(task))}</text>`);
      parts.push(`<line x1="${MG}" y1="${ry+ROW_H}" x2="${MG+SW}" y2="${ry+ROW_H}" stroke="${BRD}" stroke-width="0.4"/>`);
    });

    // ── РАЗДЕЛИТЕЛЬ задачи | диаграмма ──
    parts.push(`<line x1="${MG+SW}" y1="${MG}" x2="${MG+SW}" y2="${MG+HDR_H+vt.length*ROW_H}" stroke="${BRDA}" stroke-width="1.5"/>`);

    // ── ВНЕШНЯЯ РАМКА ──
    parts.push(`<rect x="${MG}" y="${MG}" width="${PW-MG*2}" height="${HDR_H+vt.length*ROW_H}" rx="4" fill="none" stroke="${BRDA}" stroke-width="1"/>`);
    parts.push('</svg>');

    const blob=new Blob([parts.join('\n')],{type:'image/svg+xml'});
    const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=(S.projectName||'gantt')+'.svg';a.click();URL.revokeObjectURL(u);
    ov.classList.remove('show');toast('SVG saved');
  }catch(err){document.getElementById('expov').classList.remove('show');toast('Error: '+err.message);console.error(err);}
}

// ══════════════════════════════
//  XLS EXPORT (SpreadsheetML, с иерархией)
// ══════════════════════════════
function exportXLS(){
  const fmtD=s=>{const d=parseDate(s);return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getFullYear()).slice(2)}`;};
  const xe=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const getTags=t=>(t.tags||[]).map(tid=>{const g=S.globalTags.find(x=>x.id===tid);return g?g.name:'';}).filter(Boolean).join(', ');
  const cS=(v,sty='')=>`<Cell${sty?` ss:StyleID="${sty}"`:''}><Data ss:Type="String">${xe(v)}</Data></Cell>`;
  const cN=(v,sty='')=>`<Cell${sty?` ss:StyleID="${sty}"`:''}><Data ss:Type="Number">${v}</Data></Cell>`;
  const rows=[];
  // Header row
  rows.push(`<Row ss:StyleID="h">${['Task','Tags','Start','End','Progress (%)'].map(v=>`<Cell><Data ss:Type="String">${xe(v)}</Data></Cell>`).join('')}</Row>`);
  // Groups with tasks
  S.groups.forEach(grp=>{
    const grpTasks=S.tasks.filter(t=>t.groupId===grp.id&&!t.parentId);
    rows.push(`<Row>${cS(grp.name,'b')}<Cell/><Cell/><Cell/><Cell/></Row>`);
    grpTasks.forEach(task=>{
      rows.push(`<Row ss:OutlineLevel="1">${cS('  '+task.name)}${cS(getTags(task))}${cS(fmtD(task.start))}${cS(fmtD(task.end))}${cN(task.progress||0)}</Row>`);
      S.tasks.filter(st=>st.parentId===task.id).forEach(sub=>{
        rows.push(`<Row ss:OutlineLevel="2">${cS('    '+sub.name)}${cS(getTags(sub))}${cS(fmtD(sub.start))}${cS(fmtD(sub.end))}${cN(sub.progress||0)}</Row>`);
      });
    });
  });
  // Ungrouped tasks
  S.tasks.filter(t=>!t.groupId&&!t.parentId).forEach(task=>{
    rows.push(`<Row>${cS(task.name)}${cS(getTags(task))}${cS(fmtD(task.start))}${cS(fmtD(task.end))}${cN(task.progress||0)}</Row>`);
    S.tasks.filter(st=>st.parentId===task.id).forEach(sub=>{
      rows.push(`<Row ss:OutlineLevel="1">${cS('  '+sub.name)}${cS(getTags(sub))}${cS(fmtD(sub.start))}${cS(fmtD(sub.end))}${cN(sub.progress||0)}</Row>`);
    });
  });
  const styles=`<Styles><Style ss:ID="h"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#5b6af0" ss:Pattern="Solid"/></Style><Style ss:ID="b"><Font ss:Bold="1"/></Style></Styles>`;
  const wopts=`<WorksheetOptions xmlns="urn:schemas-microsoft-com:office:excel"><Outline><SummaryRowBelow ss:Data="0"/></Outline></WorksheetOptions>`;
  const xml=`<?xml version="1.0" encoding="UTF-8"?>\n<?mso-application progid="Excel.Sheet"?>\n<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet" xmlns:x="urn:schemas-microsoft-com:office:excel">\n${styles}\n<Worksheet ss:Name="Tasks"><Table DefaultColumnWidth="140">${rows.join('')}</Table>${wopts}</Worksheet>\n</Workbook>`;
  const blob=new Blob(['\uFEFF'+xml],{type:'application/vnd.ms-excel;charset=utf-8'});
  const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=(S.projectName||'gantt')+'.xls';a.click();URL.revokeObjectURL(u);
  toast('XLS saved');
}

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ══════════════════════════════
//  CLOUD SYNC
// ══════════════════════════════
function setCloudStatus(st){
  const el=document.getElementById('cloud-status');
  if(!el||!CLOUD_URL){if(el)el.style.display='none';return;}
  el.style.display='flex';
  const svgCloud=`<svg viewBox="0 0 20 14" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M16.5 12H5a3 3 0 01-.5-6 5 5 0 019.9-1A3.5 3.5 0 0116.5 12z"/></svg>`;
  const svgSpin=`<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" style="animation:cloud-spin .7s linear infinite"><circle cx="8" cy="8" r="6" stroke-dasharray="20 18" stroke-linecap="round"/></svg>`;
  if(st==='saving'||st==='loading'){el.style.color='var(--text3)';el.innerHTML=svgSpin+(st==='loading'?' Loading…':' Saving…');}
  else if(st==='saved'){el.style.color='var(--green)';el.innerHTML=svgCloud+' Saved';}
  else if(st==='error'){el.style.color='var(--red)';el.innerHTML=svgCloud+' Error';}
  else{el.style.display='none';}
}
function cloudLoad(){
  if(!CLOUD_URL)return;
  setCloudStatus('loading');
  fetch(CLOUD_URL+'/api/data',{headers:CLOUD_KEY?{'x-gantt-key':CLOUD_KEY}:{}})
  .then(r=>r.ok?r.json():null)
  .then(data=>{
    if(!data||!data.state){setCloudStatus('idle');return;}
    _skipCloudSave=true;
    Object.assign(S,data.state);
    if(data.zoom){zoom=data.zoom;['day','week','month','quarter'].forEach(k=>document.getElementById('z'+k[0]).classList.toggle('zactive',k===zoom));}
    if(data.viewStart){viewStart=parseDate(data.viewStart);normalise();}
    render();
    _skipCloudSave=false;
    _seedLoaded=false;
    setCloudStatus('saved');
  })
  .catch(()=>setCloudStatus('error'));
}
function cloudSave(){
  if(!CLOUD_URL)return;
  setCloudStatus('saving');
  const payload={zoom,viewStart:fmtDate(viewStart),savedAt:new Date().toISOString(),state:JSON.parse(JSON.stringify(S))};
  fetch(CLOUD_URL+'/api/data',{method:'POST',headers:{'Content-Type':'application/json',...(CLOUD_KEY?{'x-gantt-key':CLOUD_KEY}:{})},body:JSON.stringify(payload)})
  .then(r=>r.ok?r.json():Promise.reject())
  .then(()=>setCloudStatus('saved'))
  .catch(()=>setCloudStatus('error'));
}
function scheduleCloudSave(){
  if(!CLOUD_URL||_skipCloudSave)return;
  clearTimeout(_cloudSaveTimer);
  setCloudStatus('saving');
  _cloudSaveTimer=setTimeout(cloudSave,2000);
}

// ══════════════════════════════
//  PERSISTENCE (localStorage)
// ══════════════════════════════
const LS_KEY='ganttshot_v1';
// ══════════════════════════════
//  UNDO
// ══════════════════════════════
const _undoStack=[];
const _UNDO_LIMIT=50;
function saveUndo(){_undoStack.push(JSON.stringify(S));if(_undoStack.length>_UNDO_LIMIT)_undoStack.shift();}
function undo(){
  if(!_undoStack.length){toast('Nothing to undo');return;}
  Object.assign(S,JSON.parse(_undoStack.pop()));
  render();toast('Undone');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});

function saveState(){
  const payload={zoom,viewStart:fmtDate(viewStart),savedAt:new Date().toISOString(),state:S};
  try{localStorage.setItem(LS_KEY,JSON.stringify(payload));}catch(e){}
  scheduleCloudSave();
}
function loadState(){
  try{
    const p=JSON.parse(localStorage.getItem(LS_KEY)||'null');
    if(!p||!p.state)return false;
    Object.assign(S,p.state);
    if(p.zoom)zoom=p.zoom;
    if(p.viewStart){viewStart=parseDate(p.viewStart);normalise();}
    return true;
  }catch(e){return false;}
}

(()=>{
  const loaded=loadState();
  if(!loaded){seed();viewStart=new Date(TODAY);normalise();_seedLoaded=true;}
  setZoom(zoom);
  cloudLoad();
  let _sync=false;
  const tl=document.getElementById('task-list'),gw=document.getElementById('gantt-wrap');
  tl.addEventListener('scroll',()=>{if(_sync)return;_sync=true;gw.scrollTop=tl.scrollTop;_sync=false;});
  gw.addEventListener('scroll',()=>{if(_sync)return;_sync=true;tl.scrollTop=gw.scrollTop;_sync=false;});
  // wheel on gantt area navigates calendar timeline
  gw.addEventListener('wheel',e=>{
    e.preventDefault();
    const dir=e.deltaY>0?-1:1;
    if(zoom==='day')     viewStart=addDays(viewStart,dir*3);
    else if(zoom==='week')  viewStart=addDays(viewStart,dir*7);
    else if(zoom==='month') viewStart=addMonths(viewStart,dir);
    else                    viewStart=addMonths(viewStart,dir*3);
    normalise();render();
  },{passive:false});
})();
</script>
</body>
</html>
